<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  
  <script>
    if (sessionStorage.getItem('token') !== 'jwt123') {
      window.location.href = 'index.html';
    }
  </script>
</head>

<body class="dashboard-layout">
  <header class="dashboard-header">
    <div class="header-container">
      <div class="title">
        <span>Dashboard</span>
      </div>

      <div class="user-profile">
        <div class="user-info">
          <span class="user-name" id="user-display-name">Admin</span>
          <span class="user-role">Administrador</span>
        </div>
        <button id="btn-logout" class="btn-logout" aria-label="Sair do painel">
          <span>Sair</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <section class="dashboard-hero">
      <h2>Painel de Controle</h2>
      <p>Gerencie seus cartões informativos em tempo real. Adicione novos elementos, carregue dados dinamicamente e remova itens conforme necessário.</p>
    </section>

    <section class="dashboard-toolbar">
      <div class="section-title">
        <span>Cartões Registrados</span>
        <span class="badge" id="cards-count">0</span>
      </div>
      
      <button id="btn-add-card" class="btn-add" aria-label="Adicionar novo cartão">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>ADD</span>
      </button>
    </section>

    <section class="cards-grid" id="cards-container" aria-live="polite">
    </section>

  </main>

  <div id="add-card-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Adicionar Novo Card</h3>
      </div>
      <form id="add-card-form" novalidate>
        <div class="form-group">
          <label for="card-title-input">Título do Card</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="card-title-input" 
              class="form-input" 
              placeholder="Ex: Tarefas do Dia" 
              required
              style="padding-left: 16px;"
            >
          </div>
        </div>
        <div class="form-group">
          <label for="card-desc-input">Descrição</label>
          <div class="input-wrapper">
            <textarea 
              id="card-desc-input" 
              class="form-input" 
              placeholder="Ex: Detalhamento sobre os novos cards criados dinamicamente no sistema." 
              required
              style="padding-left: 16px; min-height: 100px; resize: vertical;"
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="btn-cancel-add" class="btn-secondary">Cancelar</button>
          <button type="submit" class="btn-primary" style="width: auto;">Adicionar</button>
        </div>
      </form>
    </div>
  </div>
  
  <div class="toast-container" id="toast-container"></div>

  <script src="dashboard.js"></script>
</body>
</html>
